<!DOCTYPE html>
<html>
<head>
  <title>Signal Decoder</title>
  <style>
    body {
      background: black;
      color: #00ff88;
      font-family: monospace;
      margin: 0;
      overflow: hidden;
    }

    body::after {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        0deg,
        rgba(0,255,136,0.05),
        rgba(0,255,136,0.05) 1px,
        transparent 1px,
        transparent 3px
      );
      pointer-events: none;
    }

    #gameBox {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 420px;
      padding: 25px;
      border: 1px solid #00ff88;
      box-shadow: 0 0 25px #00ff88;
      background: rgba(0,0,0,0.9);
    }

    h1 {
      font-size: 18px;
      margin-bottom: 10px;
      border-bottom: 1px solid #00ff88;
      padding-bottom: 5px;
    }

    #levelDisplay {
      font-size: 12px;
      opacity: 0.7;
    }

    #progressContainer {
      width: 100%;
      height: 10px;
      border: 1px solid #00ff88;
      margin: 10px 0;
    }

    #progressBar {
      height: 100%;
      width: 0%;
      background: #00ff88;
      box-shadow: 0 0 8px #00ff88;
      transition: width 0.3s;
    }

    #pattern {
      margin: 20px 0;
      font-size: 20px;
      letter-spacing: 2px;
    }

    input {
      width: 100%;
      padding: 8px;
      background: black;
      border: 1px solid #00ff88;
      color: #00ff88;
      outline: none;
    }

    input:focus {
      box-shadow: 0 0 8px #00ff88;
    }

    button {
      width: 100%;
      margin-top: 10px;
      padding: 8px;
      background: black;
      border: 1px solid #00ff88;
      color: #00ff88;
      cursor: pointer;
    }

    button:hover {
      background: #00ff88;
      color: black;
    }

    #feedback {
      margin-top: 10px;
      font-size: 13px;
      height: 16px;
    }

    .flicker {
      animation: flicker 0.15s infinite;
    }

    @keyframes flicker {
      0% { opacity: 1; }
      50% { opacity: 0.6; }
      100% { opacity: 1; }
    }

    .glitch {
      animation: glitch 0.15s;
    }

    @keyframes glitch {
      0% { transform: translate(2px, -2px); }
      50% { transform: translate(-2px, 2px); }
      100% { transform: translate(0, 0); }
    }
  </style>
</head>

<body>

<div id="gameBox">
  <h1>> SIGNAL_DECODER.exe</h1>

  <p id="levelDisplay"></p>

  <div id="progressContainer">
    <div id="progressBar"></div>
  </div>

  <p id="pattern"></p>

  <input id="answer" placeholder="ENTER SIGNAL">
  <button onclick="checkAnswer()">EXECUTE</button>

  <p id="feedback"></p>
</div>

<script src="game.js"></script>

</body>
</html>
